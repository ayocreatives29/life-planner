<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toby's Life Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-4 md:p-8">

    <div id="toast" class="toast">Event saved!</div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden">
            <div class="bg-gray-900 text-white px-6 py-4">
                <h3 class="font-serif text-xl font-semibold">Add New Task</h3>
                <p class="text-xs text-gray-400 mt-0.5">Fill in the details below</p>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase tracking-wide">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900 focus:border-transparent transition">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase tracking-wide">Date</label>
                        <input type="date" id="taskDate" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase tracking-wide">Time</label>
                        <input type="time" id="taskTime" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase tracking-wide">Category</label>
                        <select id="taskCategory" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900 bg-white">
                            <option value="work">Work</option>
                            <option value="ministry">Ministry</option>
                            <option value="family">Family</option>
                            <option value="personal">Personal</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase tracking-wide">Priority</label>
                        <select id="taskPriority" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-gray-900 bg-white">
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-2 uppercase tracking-wide">Notes</label>
                    <textarea id="taskNotes" placeholder="Additional details..." class="w-full p-3 border border-gray-200 rounded-xl h-24 resize-none focus:ring-2 focus:ring-gray-900"></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 text-gray-500 font-semibold hover:bg-gray-50 rounded-xl transition">Cancel</button>
                    <button onclick="saveTask()" class="flex-1 py-3 bg-gray-900 text-white rounded-xl font-semibold hover:bg-gray-800 transition shadow-lg">Save Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-5">
        <div>
            <h1 class="font-serif text-4xl md:text-5xl text-gray-900 tracking-tight">Toby's Planner</h1>
            <p id="currentDateDisplay" class="text-xs text-gray-500 uppercase tracking-widest mt-2 font-medium"></p>
        </div>
        <div class="flex flex-wrap items-center gap-3">
            <button id="googleSyncBtn" onclick="handleGoogleAuth()" class="px-5 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl text-sm font-semibold hover:bg-gray-50 transition flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.706c-.18-.54-.282-1.117-.282-1.706s.102-1.166.282-1.706V4.963H.957C.347 6.175 0 7.55 0 9s.347 2.825.957 4.037l3.007-2.331z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.443 2.048.957 4.963L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Google Sync
            </button>
            <button onclick="openModal()" class="bg-gray-900 text-white px-6 py-3 rounded-xl text-sm font-semibold shadow-lg hover:bg-gray-800 transition flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                New Task
            </button>
            <button onclick="clearCompleted()" class="px-5 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl text-sm font-semibold hover:bg-gray-50 transition">
                Clear Completed
            </button>
            <button onclick="exportData()" class="px-5 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl text-sm font-semibold hover:bg-gray-50 transition">
                Export
            </button>
        </div>
    </header>

    <!-- Layer 1: Today Strip -->
    <section class="mb-12">
        <div class="flex justify-between items-end mb-5">
            <h2 class="text-[11px] font-bold text-gray-500 uppercase tracking-[0.15em] flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                Layer 01: Today
            </h2>
            <span id="todayCount" class="text-xs bg-gray-100 px-3 py-1 rounded-full font-bold text-gray-700"></span>
        </div>
        <div id="todayStrip" class="scroll-container flex gap-4 overflow-x-auto pb-4 min-h-[140px]"></div>
    </section>

    <!-- Layer 2: Weekly Grid -->
    <section class="mb-12">
        <h2 class="text-[11px] font-bold text-gray-500 uppercase tracking-[0.15em] mb-5 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            Layer 02: This Week
        </h2>
        <div id="weeklyGrid" class="scroll-container horizontal-scroll gap-5 pb-2"></div>
    </section>

    <!-- Layer 3: Horizon & Awaiting -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
        <div class="lg:col-span-2">
            <h2 class="text-[11px] font-bold text-gray-500 uppercase tracking-[0.15em] mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-purple-500"></span>
                Layer 03: Horizon (30+ Days)
            </h2>
            <div class="layer-bg rounded-2xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wide">Date</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wide">Task</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wide">Category</th>
                            <th class="p-4 text-xs font-bold text-gray-500 uppercase tracking-wide">Priority</th>
                        </tr>
                    </thead>
                    <tbody id="horizonBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>

        <div>
            <h2 class="text-[11px] font-bold text-red-500 uppercase tracking-[0.15em] mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                Awaiting Response
            </h2>
            <div id="awaitingList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Stats Footer -->
    <footer class="border-t border-gray-200 pt-6 mt-8">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <div class="flex gap-8">
                <div class="text-center">
                    <p id="totalTasks" class="text-2xl font-bold text-gray-900">0</p>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">Total</p>
                </div>
                <div class="text-center">
                    <p id="completedTasks" class="text-2xl font-bold text-green-600">0</p>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">Done</p>
                </div>
                <div class="text-center">
                    <p id="pendingTasks" class="text-2xl font-bold text-amber-600">0</p>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">Pending</p>
                </div>
            </div>
            <p class="text-xs text-gray-400">Built with purpose</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
